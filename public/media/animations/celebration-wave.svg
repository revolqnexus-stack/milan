<svg width="320" height="300" viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes bounce {
      0%,100% { transform: translateY(0) rotate(0deg); }
      30% { transform: translateY(-14px) rotate(3deg); }
      60% { transform: translateY(-6px) rotate(-2deg); }
    }
    @keyframes arm-wave {
      0%,100% { transform: rotate(-15deg); }
      40% { transform: rotate(30deg); }
      70% { transform: rotate(-25deg); }
    }
    @keyframes arm-left {
      0%,100% { transform: rotate(10deg); }
      50% { transform: rotate(-15deg); }
    }
    @keyframes confetti-1 {
      0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(20px, 40px) rotate(180deg); opacity: 0; }
    }
    @keyframes confetti-2 {
      0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(-25px, 50px) rotate(-200deg); opacity: 0; }
    }
    @keyframes confetti-3 {
      0% { transform: translate(0,0) rotate(0deg); opacity: 1; }
      100% { transform: translate(10px, 45px) rotate(270deg); opacity: 0; }
    }
    @keyframes star-pop {
      0%,70%,100% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.2); opacity: 1; }
      90% { transform: scale(1); opacity: 1; }
    }
    @keyframes blink {
      0%,85%,100% { ry: 8; }
      90%,95% { ry: 1; }
    }
    .body { animation: bounce 1.8s cubic-bezier(0.36, 0.07, 0.19, 0.97) infinite; transform-origin: 160px 220px; }
    .right-arm { animation: arm-wave 1.8s ease-in-out infinite; transform-origin: 200px 175px; }
    .left-arm { animation: arm-left 1.8s ease-in-out infinite; transform-origin: 120px 175px; }
    .c1 { animation: confetti-1 2s ease-in infinite; }
    .c2 { animation: confetti-2 2s ease-in infinite 0.4s; }
    .c3 { animation: confetti-3 2s ease-in infinite 0.8s; }
    .c4 { animation: confetti-1 2s ease-in infinite 1.2s; }
    .c5 { animation: confetti-2 2s ease-in infinite 0.2s; }
    .star { animation: star-pop 1.8s ease-out infinite; }
    .star2 { animation: star-pop 1.8s ease-out infinite 0.6s; }
    .eye-l { animation: blink 2.5s ease-in-out infinite; }
    .eye-r { animation: blink 2.5s ease-in-out infinite 0.1s; }
    @media (prefers-reduced-motion: reduce) {
      .body, .right-arm, .left-arm, .c1, .c2, .c3, .c4, .c5, .star, .star2 { animation: none; }
      .eye-l, .eye-r { animation: none; }
    }
  </style>

  <!-- confetti -->
  <g class="c1"><rect x="100" y="80" width="8" height="12" rx="2" fill="#f87171" transform="rotate(20)"/></g>
  <g class="c2"><rect x="200" y="70" width="8" height="12" rx="2" fill="#34d399" transform="rotate(-15)"/></g>
  <g class="c3"><rect x="155" y="55" width="8" height="12" rx="2" fill="#60a5fa" transform="rotate(40)"/></g>
  <g class="c4"><rect x="230" y="90" width="8" height="12" rx="2" fill="#fbbf24" transform="rotate(-30)"/></g>
  <g class="c5"><rect x="82" y="95" width="8" height="12" rx="2" fill="#c084fc" transform="rotate(15)"/></g>

  <!-- stars -->
  <g class="star">
    <text x="240" y="110" font-size="22" fill="#fbbf24">★</text>
  </g>
  <g class="star2">
    <text x="68" y="105" font-size="18" fill="#f472b6">★</text>
  </g>

  <g class="body">
    <!-- torso -->
    <rect x="130" y="195" width="60" height="65" rx="14" fill="#4f46e5"/>

    <!-- head -->
    <ellipse cx="160" cy="165" rx="52" ry="55" fill="#fde68a"/>
    <ellipse cx="160" cy="165" rx="52" ry="55" fill="none" stroke="#d97706" stroke-width="2"/>

    <!-- hair -->
    <path d="M112 145 Q118 100 160 104 Q202 100 208 145" fill="#78350f"/>
    <ellipse cx="112" cy="145" rx="8" ry="12" fill="#78350f"/>
    <ellipse cx="208" cy="145" rx="8" ry="12" fill="#78350f"/>

    <!-- Eyes — big happy crescents -->
    <ellipse class="eye-l" cx="142" cy="165" rx="10" ry="8" fill="white"/>
    <ellipse cx="142" cy="165" rx="6" ry="6" fill="#1e293b"/>
    <ellipse cx="144" cy="162" rx="2" ry="2" fill="white"/>

    <ellipse class="eye-r" cx="178" cy="165" rx="10" ry="8" fill="white"/>
    <ellipse cx="178" cy="165" rx="6" ry="6" fill="#1e293b"/>
    <ellipse cx="180" cy="162" rx="2" ry="2" fill="white"/>

    <!-- Happy arched eyebrows -->
    <path d="M130 148 Q142 140 154 146" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>
    <path d="M166 146 Q178 140 190 148" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>

    <!-- Big open smile -->
    <path d="M136 184 Q160 200 184 184" fill="#fff" stroke="#92400e" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M136 184 Q160 200 184 184" fill="#f87171" opacity="0.35"/>

    <!-- Cheeks -->
    <ellipse cx="120" cy="178" rx="12" ry="8" fill="#fca5a5" opacity="0.55"/>
    <ellipse cx="200" cy="178" rx="12" ry="8" fill="#fca5a5" opacity="0.55"/>

    <!-- Left arm -->
    <g class="left-arm">
      <path d="M130 200 Q108 215 96 240" fill="none" stroke="#fde68a" stroke-width="14" stroke-linecap="round"/>
      <!-- Hand -->
      <circle cx="94" cy="244" r="10" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
    </g>

    <!-- Right arm raised (waving) -->
    <g class="right-arm">
      <path d="M190 200 Q212 185 228 165" fill="none" stroke="#fde68a" stroke-width="14" stroke-linecap="round"/>
      <!-- Hand with fingers -->
      <circle cx="232" cy="160" r="12" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
    </g>

    <!-- Legs -->
    <path d="M145 258 Q140 272 138 285" fill="none" stroke="#4f46e5" stroke-width="14" stroke-linecap="round"/>
    <path d="M175 258 Q180 272 182 285" fill="none" stroke="#4f46e5" stroke-width="14" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="136" cy="288" rx="12" ry="6" fill="#1e293b"/>
    <ellipse cx="184" cy="288" rx="12" ry="6" fill="#1e293b"/>
  </g>
</svg>
