<svg width="120" height="140" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes steam { 
      0% { opacity: 0.7; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-30px) scale(1.5); }
    }
    .steam1 { animation: steam 2.5s ease-out infinite; }
    .steam2 { animation: steam 2.5s ease-out infinite 0.8s; }
    .steam3 { animation: steam 2.5s ease-out infinite 1.6s; }
    @media (prefers-reduced-motion: reduce) {
      .steam1, .steam2, .steam3 { animation: none; opacity: 0.3; }
    }
  </style>
  
  <!-- Coffee cup -->
  <path d="M25 80 L25 110 Q25 115 30 115 L70 115 Q75 115 75 110 L75 80 Z" fill="#8b5a3c" stroke="#6b4423" stroke-width="2"/>
  <ellipse cx="50" cy="80" rx="25" ry="8" fill="#5a3a2c"/>
  
  <!-- Handle -->
  <path d="M75 85 Q90 85 90 100 Q90 110 75 110" fill="none" stroke="#8b5a3c" stroke-width="3"/>
  
  <!-- Steam wisps -->
  <ellipse class="steam1" cx="40" cy="70" rx="4" ry="8" fill="#cbd5e1" opacity="0.7"/>
  <ellipse class="steam2" cx="50" cy="65" rx="5" ry="10" fill="#cbd5e1" opacity="0.7"/>
  <ellipse class="steam3" cx="60" cy="68" rx="4" ry="9" fill="#cbd5e1" opacity="0.7"/>
</svg>
