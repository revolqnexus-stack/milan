<svg width="180" height="200" viewBox="0 0 180 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes shuffle1 { 
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-8px, -10px) rotate(-8deg); }
    }
    @keyframes shuffle2 { 
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(5px, -8px) rotate(5deg); }
    }
    @keyframes shuffle3 { 
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(-3px, -12px) rotate(-3deg); }
    }
    .paper1 { animation: shuffle1 3s ease-in-out infinite; transform-origin: center; }
    .paper2 { animation: shuffle2 3.2s ease-in-out infinite 0.6s; transform-origin: center; }
    .paper3 { animation: shuffle3 2.8s ease-in-out infinite 1.2s; transform-origin: center; }
    @media (prefers-reduced-motion: reduce) {
      .paper1, .paper2, .paper3 { animation: none; }
    }
  </style>
  
  <!-- Paper 1 (bottom) -->
  <g class="paper1">
    <rect x="30" y="70" width="110" height="140" rx="4" fill="#fff" stroke="#d1d5db" stroke-width="2"/>
    <line x1="45" y1="85" x2="125" y2="85" stroke="#e5e7eb" stroke-width="2"/>
    <line x1="45" y1="95" x2="120" y2="95" stroke="#e5e7eb" stroke-width="2"/>
    <line x1="45" y1="105" x2="115" y2="105" stroke="#e5e7eb" stroke-width="2"/>
    <circle cx="50" cy="130" r="3" fill="#4f46e5"/>
    <circle cx="50" cy="145" r="3" fill="#4f46e5"/>
    <circle cx="50" cy="160" r="3" fill="#4f46e5"/>
  </g>
  
  <!-- Paper 2 (middle) -->
  <g class="paper2">
    <rect x="35" y="65" width="110" height="140" rx="4" fill="#fef3c7" stroke="#d1d5db" stroke-width="2"/>
    <line x1="50" y1="80" x2="130" y2="80" stroke="#fbbf24" stroke-width="2"/>
    <line x1="50" y1="90" x2="125" y2="90" stroke="#fbbf24" stroke-width="2"/>
    <line x1="50" y1="100" x2="120" y2="100" stroke="#fbbf24" stroke-width="2"/>
  </g>
  
  <!-- Paper 3 (top) -->
  <g class="paper3">
    <rect x="40" y="60" width="110" height="140" rx="4" fill="#dbeafe" stroke="#d1d5db" stroke-width="2"/>
    <line x1="55" y1="75" x2="135" y2="75" stroke="#3b82f6" stroke-width="2"/>
    <line x1="55" y1="85" x2="130" y2="85" stroke="#3b82f6" stroke-width="2"/>
    <line x1="55" y1="95" x2="125" y2="95" stroke="#3b82f6" stroke-width="2"/>
    <text x="60" y="125" font-family="sans-serif" font-size="12" fill="#1e40af" font-weight="600">Q.P. 9114</text>
  </g>
</svg>
