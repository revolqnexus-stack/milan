<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes float1 { 
      0%, 100% { transform: translateY(0px) rotate(-5deg); }
      50% { transform: translateY(-15px) rotate(-3deg); }
    }
    @keyframes float2 { 
      0%, 100% { transform: translateY(0px) rotate(8deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }
    @keyframes float3 { 
      0%, 100% { transform: translateY(0px) rotate(-3deg); }
      50% { transform: translateY(-12px) rotate(-5deg); }
    }
    .book1 { animation: float1 3s ease-in-out infinite; transform-origin: center; }
    .book2 { animation: float2 3.5s ease-in-out infinite 0.5s; transform-origin: center; }
    .book3 { animation: float3 4s ease-in-out infinite 1s; transform-origin: center; }
    @media (prefers-reduced-motion: reduce) {
      .book1, .book2, .book3 { animation: none; }
    }
  </style>
  
  <!-- Book 1 -->
  <g class="book1">
    <rect x="40" y="80" width="45" height="60" rx="2" fill="#4f46e5" opacity="0.9"/>
    <rect x="42" y="82" width="41" height="56" rx="1" fill="#6366f1" opacity="0.3"/>
    <line x1="45" y1="90" x2="80" y2="90" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="45" y1="97" x2="75" y2="97" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Book 2 -->
  <g class="book2">
    <rect x="75" y="70" width="50" height="65" rx="2" fill="#ec4899" opacity="0.9"/>
    <rect x="77" y="72" width="46" height="61" rx="1" fill="#f472b6" opacity="0.3"/>
    <line x1="80" y1="80" x2="118" y2="80" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="80" y1="88" x2="115" y2="88" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="80" y1="96" x2="110" y2="96" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Book 3 -->
  <g class="book3">
    <rect x="115" y="85" width="40" height="55" rx="2" fill="#10b981" opacity="0.9"/>
    <rect x="117" y="87" width="36" height="51" rx="1" fill="#34d399" opacity="0.3"/>
    <line x1="120" y1="95" x2="148" y2="95" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <line x1="120" y1="102" x2="145" y2="102" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
