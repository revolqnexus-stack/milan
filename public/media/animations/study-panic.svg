<svg width="320" height="280" viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes blink {
      0%,90%,100% { ry: 8; }
      92%,98% { ry: 1; }
    }
    @keyframes sweat {
      0%,40% { transform: translateY(0); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(28px); opacity: 0; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-4px) rotate(-1deg); }
      40% { transform: translateX(4px) rotate(1deg); }
      60% { transform: translateX(-3px) rotate(-0.5deg); }
      80% { transform: translateX(3px) rotate(0.5deg); }
    }
    @keyframes float-book {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-8px) rotate(-5deg); }
    }
    @keyframes float-book2 {
      0%,100% { transform: translateY(0) rotate(4deg); }
      50% { transform: translateY(-6px) rotate(4deg); }
    }
    @keyframes pulse-eye {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    .face { animation: shake 3s ease-in-out infinite 1s; }
    .eye-l { animation: blink 3s ease-in-out infinite; }
    .eye-r { animation: blink 3s ease-in-out infinite 0.1s; }
    .sweat-drop { animation: sweat 2s ease-in infinite; }
    .sweat-drop2 { animation: sweat 2s ease-in infinite 1s; }
    .book1 { animation: float-book 2.5s ease-in-out infinite; }
    .book2 { animation: float-book2 2.8s ease-in-out infinite 0.4s; }
    @media (prefers-reduced-motion: reduce) {
      .face, .eye-l, .eye-r, .sweat-drop, .sweat-drop2, .book1, .book2 { animation: none; }
    }
  </style>

  <!-- Background glow -->
  <ellipse cx="160" cy="180" rx="130" ry="80" fill="#fff9e6" opacity="0.6"/>

  <!-- Floating books (background) -->
  <g class="book1">
    <rect x="32" y="90" width="52" height="70" rx="4" fill="#f87171" transform="rotate(-5 58 125)"/>
    <rect x="34" y="90" width="6" height="70" rx="2" fill="#ef4444" transform="rotate(-5 37 125)"/>
    <line x1="42" y1="108" x2="78" y2="105" stroke="#fca5a5" stroke-width="1.5" transform="rotate(-5 60 125)"/>
    <line x1="42" y1="116" x2="78" y2="113" stroke="#fca5a5" stroke-width="1.5" transform="rotate(-5 60 125)"/>
    <line x1="42" y1="124" x2="78" y2="121" stroke="#fca5a5" stroke-width="1.5" transform="rotate(-5 60 125)"/>
  </g>
  <g class="book2">
    <rect x="236" y="80" width="52" height="70" rx="4" fill="#60a5fa" transform="rotate(4 262 115)"/>
    <rect x="238" y="80" width="6" height="70" rx="2" fill="#3b82f6" transform="rotate(4 241 115)"/>
    <line x1="246" y1="98" x2="282" y2="101" stroke="#93c5fd" stroke-width="1.5" transform="rotate(4 264 115)"/>
    <line x1="246" y1="106" x2="282" y2="109" stroke="#93c5fd" stroke-width="1.5" transform="rotate(4 264 115)"/>
    <line x1="246" y1="114" x2="282" y2="117" stroke="#93c5fd" stroke-width="1.5" transform="rotate(4 264 115)"/>
  </g>

  <!-- Face group -->
  <g class="face">
    <!-- Head -->
    <ellipse cx="160" cy="148" rx="72" ry="78" fill="#fde68a"/>
    <ellipse cx="160" cy="148" rx="72" ry="78" fill="none" stroke="#d97706" stroke-width="2.5"/>

    <!-- Hair (messy) -->
    <path d="M100 110 Q108 68 160 72 Q212 68 220 110" fill="#92400e" stroke="none"/>
    <path d="M100 110 Q95 85 110 78" fill="none" stroke="#92400e" stroke-width="8" stroke-linecap="round"/>
    <path d="M220 110 Q225 85 210 78" fill="none" stroke="#92400e" stroke-width="8" stroke-linecap="round"/>
    <!-- Cowlick -->
    <path d="M155 72 Q158 52 165 60" fill="none" stroke="#92400e" stroke-width="5" stroke-linecap="round"/>

    <!-- Eyes -->
    <ellipse class="eye-l" cx="134" cy="148" rx="11" ry="8" fill="white"/>
    <ellipse cx="134" cy="148" rx="6" ry="6" fill="#1e293b"/>
    <ellipse cx="136" cy="145" rx="2" ry="2" fill="white"/>

    <ellipse class="eye-r" cx="186" cy="148" rx="11" ry="8" fill="white"/>
    <ellipse cx="186" cy="148" rx="6" ry="6" fill="#1e293b"/>
    <ellipse cx="188" cy="145" rx="2" ry="2" fill="white"/>

    <!-- Stressed eyebrows -->
    <path d="M122 132 Q134 125 146 132" fill="none" stroke="#92400e" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M174 132 Q186 125 198 132" fill="none" stroke="#92400e" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Squiggly worried mouth -->
    <path d="M138 177 Q147 172 155 177 Q163 182 172 177 Q180 172 186 176" fill="none" stroke="#92400e" stroke-width="3" stroke-linecap="round"/>

    <!-- Rosy cheeks -->
    <ellipse cx="116" cy="168" rx="12" ry="8" fill="#fca5a5" opacity="0.5"/>
    <ellipse cx="204" cy="168" rx="12" ry="8" fill="#fca5a5" opacity="0.5"/>

    <!-- Sweat drops -->
    <g class="sweat-drop">
      <ellipse cx="215" cy="128" rx="5" ry="7" fill="#93c5fd" opacity="0.85"/>
      <path d="M215 121 Q218 116 215 113" fill="#93c5fd" opacity="0.85"/>
    </g>
    <g class="sweat-drop2">
      <ellipse cx="228" cy="138" rx="4" ry="6" fill="#93c5fd" opacity="0.7"/>
      <path d="M228 132 Q231 128 228 125" fill="#93c5fd" opacity="0.7"/>
    </g>
  </g>

  <!-- Panic lines radiating out -->
  <line x1="88" y1="100" x2="68" y2="80" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="232" y1="100" x2="252" y2="80" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="160" y1="68" x2="160" y2="44" stroke="#fbbf24" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="100" y1="76" x2="84" y2="58" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="218" y1="76" x2="234" y2="58" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
